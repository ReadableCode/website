server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Same-origin API: proxy /api/ to the backend container on the internal
  # docker network. The backend publishes no host ports, so this is the only
  # path to it. Trailing slashes make /api/status -> backend /status.
  location /api/ {
    proxy_pass http://website-backend:8002/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Curlable edition of the site at the root, so `curl site.tinkernet.me/curl`
  # works without the /api prefix.
  location = /curl {
    proxy_pass http://website-backend:8002/curl;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback for the React app.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
